<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权回调</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .message {
            text-align: center;
            padding: 32px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .message h2 { margin: 0 0 16px; font-size: 20px; color: #24292e; }
        .message p { margin: 0 0 24px; color: #586069; font-size: 14px; }
    </style>
</head>
<body>
    <div class="message" id="msg">
        <h2>授权处理中…</h2>
        <p>正在完成 GitHub 授权，请稍候</p>
    </div>
<script>
(function() {
    var url = new URL(location.href);
    var code = url.searchParams.get('code');
    var error = url.searchParams.get('error');
    var errorDesc = url.searchParams.get('error_description') || '';
    var sys = url.searchParams.get('system') || 'gitalk';
    var msgEl = document.getElementById('msg');

    // Callback 职责：仅托管 code，token 交换由 iframe 侧完成
    // 好处：client_secret 不暴露在 URL 中，且微信等 weak opener 环境也兼容
    var STORAGE_KEY = 'diversity_oauth_pending';

    if (error) {
        msgEl.innerHTML = '<h2>授权被拒绝</h2><p>' + escapeHtml(errorDesc || error) + '</p>';
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ system: sys, error: error, error_description: errorDesc }));
        if (window.opener) {
            try { window.opener.postMessage({ type: 'diversity:' + sys + ':oauth:error', error: error, error_description: errorDesc }, '*'); } catch(e) {}
        }
        setTimeout(function() { window.close(); }, 1500);
        return;
    }

    if (!code) {
        msgEl.innerHTML = '<h2>授权失败</h2><p>未获取到授权码（code 参数缺失）</p>';
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ system: sys, error: 'no_code' }));
        setTimeout(function() { window.close(); }, 2000);
        return;
    }

    // 写入 localStorage，iframe 侧通过 storage 事件获取
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ system: sys, code: code }));

    msgEl.innerHTML = '<h2>✅ 授权成功</h2><p>窗口即将关闭…</p>';
    // 普通浏览器：postMessage 加速（不走 storage 事件延迟）
    if (window.opener) {
        try { window.opener.postMessage({ type: 'diversity:' + sys + ':oauth:hint', code: code }, '*'); } catch(e) {}
    }
    setTimeout(function() { window.close(); }, 600);

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
})();
</script>
</body>
</html>
