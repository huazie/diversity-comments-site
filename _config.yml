# 网站标题
title: Diversity Comments
# 网站副标题
subtitle: 
# 网站描述，告诉搜索引擎一个关于您站点的简单描述，通常建议在其中包含您网站的关键词。
description: 'A Hexo theme with multiple comments support.'
# 网站的关键词，支持多个关键词
keywords: 
# 文章的作者
author: Huazie
# 网站使用的语言
language: zh-CN
# 网站时区。Hexo 默认使用您电脑的时区。
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://huazie.github.io
# 文章的 永久链接 格式
permalink: :year/:month/:day/:title/
# 永久链接中各部分的默认值
permalink_defaults:
pretty_urls:
  # 是否在永久链接中保留尾部的 index.html，设置为 false 时去除
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  # 是否在永久链接中保留尾部的 .html, 设置为 false 时去除 (对尾部的 index.html无效)
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
# 资源文件夹，这个文件夹用来存放内容。
source_dir: source
# 公共文件夹，这个文件夹用于存放生成的站点文件。
public_dir: public
# 标签文件夹
tag_dir: tags
# 归档文件夹
archive_dir: archives
# 分类文件夹
category_dir: categories
# Include code 文件夹，source_dir 下的子目录
code_dir: downloads/code
# 国际化（i18n）文件夹
i18n_dir: :lang
# 跳过指定文件的渲染。匹配到的文件将会被不做改动地复制到 public 目录中。您可使用 glob 表达式来匹配路径。
skip_render: 
  - 'demo/*'
  - 'callback.html'

# Writing
# 新文章的文件名称
new_post_name: :title.md # File name of new posts
# 预设布局
default_layout: post
# 把标题转换为 title case
titlecase: false # Transform title into titlecase
# 在新标签中打开链接
external_link:
  enable: true # Open external links in new tab
  # 对整个网站（site）生效或仅对文章（post）生效
  field: site # Apply to the whole site
  # 需要排除的域名。主域名和子域名如 www 需分别配置
  exclude: ''
# 把文件名称转换为 (1) 小写或 (2) 大写
filename_case: 0
# 显示草稿
render_drafts: false
# 启用 资源文件夹
post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true
# 把链接改为与根目录的相对位址
relative_link: false
# 显示未来的文章
future: true
syntax_highlighter: highlight.js
# 代码块的设置, 请参考 https://hexo.io/zh-cn/docs/syntax-highlight#Highlight-js 进行设置
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
# 代码块的设置, 请参考 https://hexo.io/zh-cn/docs/syntax-highlight#PrismJS 进行设置
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
# 默认分类
default_category: uncategorized
# 分类别名
category_map:
# 标签别名
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
# Meta generator 标签。 值为 false 时 Hexo 不会在头部插入该标签
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
# 日期格式
date_format: YYYY-MM-DD
# 时间格式
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
# 当 Front Matter 中没有指定 updated 时 updated 的取值
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
# 每页显示的文章量 (0 = 关闭分页功能)
per_page: 10
# 分页目录
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
# Hexo 默认会不包括 source/ 下的文件和文件夹（包括名称以下划线和 . 开头的文件和文件夹，Hexo 的 _posts 和 _data 等目录除外）。
# 通过设置此字段将使 Hexo 处理他们并将它们复制到 source 目录下。
include:
# Hexo 不包括 source/ 下的这些文件和目录
exclude:
# Hexo 会忽略整个 Hexo 项目下的这些文件夹或文件
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
# 当前主题名称。值为false时禁用主题
theme: diversity

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
# 部署部分的设置
deploy:
  type: ''

# hexo-minify-obfuscator 压缩和混淆配置
# 详细文档：https://github.com/nicepkg/hexo-minify-obfuscator
minifyObfuscator:
  enable: true                                # 总开关，false 则全部禁用
  previewNotice: true                         # hexo g 时是否显示插件提示信息

  # ---- JS 处理 ----
  js:
    # JS 压缩（基于 terser）
    minify:
      enable: true                            # 是否压缩 JS
      exclude: ['*.min.js']                   # 排除的文件（glob 匹配），默认跳过已压缩文件
      options:
        compress:
          drop_console: false                 # 是否移除 console.* 调用
          drop_debugger: true                 # 是否移除 debugger 语句

    # JS 混淆（基于 javascript-obfuscator）
    obfuscator:
      enable: true                            # 是否混淆 JS
      exclude: ['*.min.js']                   # 排除的文件（glob 匹配）
      options:
        compact: true                         # 压缩输出（移除换行和空格）
        controlFlowFlattening: true           # 控制流扁平化（混淆代码执行顺序）
        deadCodeInjection: true               # 注入无用代码（增加反编译难度）
        debugProtection: false                # 调试保护（开启后无法打开开发者工具）
        disableConsoleOutput: false           # 禁用 console 输出
        identifierNamesGenerator: hexadecimal # 变量名混淆方式：hexadecimal/mangled
        renameGlobals: false                  # 是否重命名全局变量（开启可能导致兼容问题）
        selfDefending: true                   # 自保护（格式化/重命名后无法运行）
        stringArray: true                     # 提取字符串到数组（增加可读性难度）
        stringArrayEncoding: ['base64']       # 字符串数组编码方式：base64/rc4
        stringArrayThreshold: 0.75            # 字符串提取阈值（0~1，越高提取越多）

  # ---- CSS 处理 ----
  css:
    enable: true                              # 是否压缩 CSS（基于 clean-css）
    exclude: []                               # 排除的文件（glob 匹配）

  # ---- HTML 处理 ----
  html:
    enable: false                             # 是否压缩 HTML（基于 htmlnano）